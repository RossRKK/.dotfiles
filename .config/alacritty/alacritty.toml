[font]
normal = { family = "0xProto Nerd Font Propo", style = "Regular" }
bold = { family = "0xProto Nerd Font Propo", style = "Bold" }
italic = { family = "0xProto Nerd Font Propo", style = "Italic" }
size = 12.0

[colors.primary]
background = "#1a1b26"
foreground = "#c0caf5"

[colors.normal]
black   = "#15161e"
red     = "#f7768e"
green   = "#9ece6a"
yellow  = "#e0af68"
blue    = "#7aa2f7"
magenta = "#bb9af7"
cyan    = "#7dcfff"
white   = "#a9b1d6"

[colors.bright]
black   = "#414868"
red     = "#f7768e"
green   = "#9ece6a"
yellow  = "#e0af68"
blue    = "#7aa2f7"
magenta = "#bb9af7"
cyan    = "#7dcfff"
white   = "#c0caf5"

[window]
padding = { x = 8, y = 8 }
decorations = "full"

[scrolling]
history = 10000
